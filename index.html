<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito Sans', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      input[type="search"]::-webkit-search-cancel-button,
input[type="search"]::-webkit-search-decoration {
  display: none;
}
    </style>
  </head>
  <body class="bg-stone-900 min-h-screen font-sans">

    <div class="min-h-screen bg-[url('assets/imgs/bg.svg')] no-repeat bg-cover relative overflow-hidden flex items-center justify-center px-6 py-12">

      <main class="relative z-10 w-full max-w-[1156px] bg-black border border-black flex flex-col items-center justify-center gap-8 px-6 md:px-20 py-16 min-h-[300px] md:min-h-[537px]">

        <header class="flex flex-wrap items-center justify-center gap-4">
          <img
            src="assets/imgs/github-logo.svg"
            alt="GitHub"
            class="w-14 h-14"
          />
          <h1 class="text-white text-6xl font-semibold font-sans leading-none">Perfil</h1>
          <img
            src="assets/imgs/github.svg"
            alt=""
            aria-hidden="true"
            class="w-40 h-11"
          />
        </header>

        <section aria-label="Busca de perfil do GitHub" class="flex justify-center w-full">
          <div class="flex w-full max-w-[567px]">
            <label for="search-input" class="sr-only">Nome de usuário do GitHub</label>
            <input
              id="search-input"
              type="search"
              placeholder="Digite um usuário do Github"
              autocomplete="off"
              class="flex-1 h-16 bg-white rounded-l-[10px] outline outline-1 outline-offset-[-0.5px] outline-neutral-200 px-5 text-xl font-semibold text-black placeholder:text-black focus:outline-none"
            />
            <button
              id="search-btn"
              type="button"
              aria-label="Buscar perfil"
              class="w-16 h-16 bg-blue-600 rounded-r-[10px] outline outline-1 outline-offset-[-0.5px] outline-neutral-200 flex items-center justify-center flex-shrink-0 cursor-pointer"
            >
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="7" stroke="white" stroke-width="2.5"/>
                <path d="M16.5 16.5L21 21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </section>

        <section
          id="result"
          aria-live="polite"
          aria-atomic="true"
          class="w-full flex justify-center"
        ></section>

      </main>
    </div>

   
    <script src="script.js"></script>
  </body>
</html>
